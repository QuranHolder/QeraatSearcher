<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d76e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0c040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a017;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a4e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- Outer decorative ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.7"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.4"/>

  <!-- Inner panel (book shape) -->
  <rect x="90" y="100" width="332" height="312" rx="24" ry="24" fill="url(#innerGrad)" opacity="0.9"/>

  <!-- Book spine line -->
  <line x1="256" y1="108" x2="256" y2="404" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.6"/>

  <!-- Top decorative arc -->
  <path d="M 156 140 Q 256 110 356 140" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.8"/>

  <!-- Bottom decorative arc -->
  <path d="M 156 372 Q 256 402 356 372" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.8"/>

  <!-- Corner ornaments -->
  <circle cx="110" cy="120" r="5" fill="url(#goldGrad)" opacity="0.7"/>
  <circle cx="402" cy="120" r="5" fill="url(#goldGrad)" opacity="0.7"/>
  <circle cx="110" cy="392" r="5" fill="url(#goldGrad)" opacity="0.7"/>
  <circle cx="402" cy="392" r="5" fill="url(#goldGrad)" opacity="0.7"/>

  <!-- Arabic letter ق (Qaf) as main centerpiece -->
  <text
    x="256"
    y="295"
    font-family="'Amiri', 'Traditional Arabic', 'Scheherazade', serif"
    font-size="185"
    font-weight="bold"
    text-anchor="middle"
    fill="url(#goldGrad)"
    filter="url(#glow)"
  >ق</text>

  <!-- Small decorative dots around letter -->
  <circle cx="256" cy="158" r="6" fill="url(#goldGrad)" opacity="0.9" filter="url(#softglow)"/>

  <!-- Stars / geometric ornaments -->
  <polygon points="140,200 146,220 168,220 151,232 157,252 140,240 123,252 129,232 112,220 134,220"
    fill="url(#goldGrad)" opacity="0.5" transform="scale(0.5) translate(140,200)"/>
  <polygon points="372,200 378,220 400,220 383,232 389,252 372,240 355,252 361,232 344,220 366,220"
    fill="url(#goldGrad)" opacity="0.5" transform="scale(0.5) translate(372,200)"/>

  <!-- Bottom text: باحث -->
  <text
    x="256"
    y="375"
    font-family="'Amiri', 'Traditional Arabic', serif"
    font-size="38"
    text-anchor="middle"
    fill="url(#goldGrad)"
    opacity="0.85"
  >باحث القراءات</text>
</svg>